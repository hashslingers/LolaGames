<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butterfly Kingdom - Save the Princess</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 10px; left: 15px;
    font-family: 'Courier New', monospace; color: #fff;
    z-index: 10; pointer-events: none;
  }
  #title {
    font-size: 18px; font-weight: bold; text-shadow: 0 0 15px #00ff88;
    margin-bottom: 5px;
  }
  #stats { font-size: 13px; color: #aaf; line-height: 1.5; }
  #weapon-ui { font-size: 13px; color: #ff0; text-shadow: 0 0 8px currentColor; margin-top: 3px; }
  #progress-container {
    position: fixed; top: 10px; right: 15px;
    font-family: 'Courier New', monospace; color: #fff;
    z-index: 10; pointer-events: none; text-align: right;
  }
  #progress-label { font-size: 12px; color: #aaa; }
  #progress-bar-outer {
    width: 200px; height: 12px; background: #222; border: 1px solid #555;
    border-radius: 6px; overflow: hidden; margin-top: 4px; margin-left: auto;
  }
  #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00ff88, #ffff00); border-radius: 6px; transition: width 0.3s; }
  #instructions {
    position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; color: #666; font-size: 11px;
    z-index: 10; pointer-events: none; text-align: center; line-height: 1.5;
  }
  #message {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Courier New', monospace; color: #fff; font-size: 28px;
    text-shadow: 0 0 30px #ff88ff; z-index: 20; display: none;
    text-align: center; pointer-events: none;
  }
  #message .sub { font-size: 14px; color: #aaa; margin-top: 8px; }
</style>
</head>
<body>
<div id="ui">
  <div id="title">BUTTERFLY KINGDOM</div>
  <div id="stats">
    KILLS: <span id="kills">0</span> &bull; HITS: <span id="hits">0</span> &bull; COMBO: <span id="combo">0</span>x
  </div>
  <div id="weapon-ui">LIGHTSABER</div>
</div>
<div id="progress-container">
  <div id="progress-label">JOURNEY TO THE CASTLE</div>
  <div id="progress-bar-outer"><div id="progress-bar"></div></div>
</div>
<div id="instructions">
  WASD / Arrows = move &bull; SPACE = attack &bull; F = Force Push &bull; E = Lightning &bull; Q = Shuriken<br>
  1-4 = weapons (Saber / Dual / Fire / Ice) &bull; Fly right to reach the castle!
</div>
<div id="message"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ============ AUDIO ============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const now = audioCtx.currentTime;
  switch(type) {
    case 'swing': {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150+Math.random()*80, now); osc.frequency.exponentialRampToValueAtTime(80, now+0.25);
      filter.type = 'lowpass'; filter.frequency.setValueAtTime(1200, now); filter.frequency.exponentialRampToValueAtTime(300, now+0.25);
      gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.25);
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.25); break;
    }
    case 'hit': {
      const noise = audioCtx.createBufferSource(); const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate);
      const data = buf.getChannelData(0); for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*0.15));
      noise.buffer = buf; const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      const filter = audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=800;
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(now); break;
    }
    case 'hum': {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=120+Math.random()*20; gain.gain.setValueAtTime(0.02,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.3); break;
    }
    case 'force': {
      const noise = audioCtx.createBufferSource(); const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.5, audioCtx.sampleRate);
      const data = buf.getChannelData(0); for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*0.3));
      noise.buffer=buf; const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.5);
      const filter = audioCtx.createBiquadFilter(); filter.type='bandpass'; filter.frequency.setValueAtTime(400,now); filter.frequency.exponentialRampToValueAtTime(100,now+0.5); filter.Q.value=2;
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(now);
      const osc = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(80,now); osc.frequency.exponentialRampToValueAtTime(30,now+0.4);
      g2.gain.setValueAtTime(0.25,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.4);
      osc.connect(g2); g2.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.4); break;
    }
    case 'lightning': {
      const osc = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type='square'; osc2.type='sawtooth';
      osc.frequency.setValueAtTime(800,now); osc.frequency.exponentialRampToValueAtTime(200,now+0.4);
      osc2.frequency.setValueAtTime(1200,now); osc2.frequency.exponentialRampToValueAtTime(100,now+0.4);
      gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.4);
      const dist = audioCtx.createWaveShaper(); const curve = new Float32Array(256);
      for (let i=0;i<256;i++){const x=i*2/256-1; curve[i]=Math.tanh(x*3);} dist.curve=curve;
      osc.connect(dist); osc2.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now+0.4); osc2.start(now); osc2.stop(now+0.4); break;
    }
    case 'shuriken': {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type='triangle'; osc.frequency.setValueAtTime(2000,now); osc.frequency.exponentialRampToValueAtTime(500,now+0.2);
      gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.2); break;
    }
    case 'fire': {
      const noise = audioCtx.createBufferSource(); const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.2, audioCtx.sampleRate);
      const data = buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.5;
      noise.buffer=buf; const gain = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
      filter.type='bandpass'; filter.frequency.value=600; filter.Q.value=1;
      gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(now); break;
    }
    case 'ice': {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(3000,now); osc.frequency.exponentialRampToValueAtTime(1000,now+0.3);
      gain.gain.setValueAtTime(0.06,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.3); break;
    }
    case 'sparkle': {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(1200,now); osc.frequency.exponentialRampToValueAtTime(2400,now+0.2);
      gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.2); break;
    }
    case 'doorOpen': {
      [0,0.08,0.16].forEach((d,i) => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type='sine'; osc.frequency.value = [400,500,600][i];
        gain.gain.setValueAtTime(0.08, now+d); gain.gain.exponentialRampToValueAtTime(0.001, now+d+0.2);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now+d); osc.stop(now+d+0.2);
      }); break;
    }
    case 'roomComplete': {
      [0,0.1,0.2,0.3].forEach((d,i) => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type='sine'; osc.frequency.value = [523,659,784,1047][i];
        gain.gain.setValueAtTime(0.12, now+d); gain.gain.exponentialRampToValueAtTime(0.001, now+d+0.3);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now+d); osc.stop(now+d+0.3);
      }); break;
    }
    case 'victory': {
      [0,0.15,0.3,0.45,0.6].forEach((d,i) => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type='sine'; osc.frequency.value = [523,659,784,1047,1319][i];
        gain.gain.setValueAtTime(0.1, now+d); gain.gain.exponentialRampToValueAtTime(0.001, now+d+0.4);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now+d); osc.stop(now+d+0.4);
      }); break;
    }
  }
}
let humTimer = 0;

// ============ WORLD CONFIG ============
const WORLD_LENGTH = 12000; // total world width in pixels
const CASTLE_X = WORLD_LENGTH - 600;
const GROUND_Y_RATIO = 0.78;

// Camera
let cameraX = 0;

// ============ GAME STATE ============
let hits = 0, combo = 0, kills = 0, gameOver = false, princessSaved = false;

// Castle interior phase
let castlePhase = false;
let castleRoom = 0; // 0-4, five rooms
let castleRoomCompleted = [false, false, false, false, false];
let castleTransition = 0; // for door transitions
let castleTransitionDir = 1; // 1 = entering, -1 = exiting
let castleButterfly = { x: 0, y: 0, vx: 0, vy: 0 };
let castleMessage = '';
let castleMessageTimer = 0;
let castleClues = ['YOU', 'ARE', 'SO', 'AMAZING', '!'];
let castleRevealedClues = [];
let roomCompleteBurst = 0; // timer for completion burst effect
let castleParticles = [];

// Room 0: Rainbow Hall - stars
let rainbowStars = [];
let rainbowStarsCollected = 0;

// Room 1: Unicorn Stable
let unicorns = [];
let unicornFound = false;

// Room 2: Axolotl Pond
let axolotls = [];
let axolotlsCaught = 0;
let axolotlSpawnTimer = 0;
const AXOLOTL_GOAL = 5;

// Room 3: Butterfly Garden (memory game)
let memoryCards = [];
let memoryFlipped = [];
let memoryMatched = 0;
let memoryLockTimer = 0;

// Room 4: Throne Room
let princessReached = false;
let currentWeapon = 0;
const weaponNames = ['LIGHTSABER','DUAL SABERS','FIRE SWORD','ICE LANCE'];
const weaponColors = [
  { core:'#ffffff', glow:'#00ff44', hue:120 },
  { core:'#ffffff', glow:'#ff44ff', hue:300 },
  { core:'#ffffff', glow:'#ff6600', hue:30 },
  { core:'#ffffff', glow:'#00ccff', hue:200 },
];

let forcePushCooldown=0; const FORCE_PUSH_CD=60;
let lightningCooldown=0; const LIGHTNING_CD=90;
let shurikenCooldown=0; const SHURIKEN_CD=30;

const keys = {};
window.addEventListener('keydown', e => {
  if(audioCtx.state==='suspended') audioCtx.resume();
  keys[e.key.toLowerCase()] = true;
  if (e.key===' ') { e.preventDefault(); if (!princessSaved) { butterfly.swinging=true; butterfly.swingTime=0; playSound(currentWeapon===2?'fire':currentWeapon===3?'ice':'swing'); }}
  if (e.key.toLowerCase()==='f' && !princessSaved && forcePushCooldown<=0) doForcePush();
  if (e.key.toLowerCase()==='e' && !princessSaved && lightningCooldown<=0) doLightning();
  if (e.key.toLowerCase()==='q' && !princessSaved && shurikenCooldown<=0) doShuriken();
  if (e.key==='1'){currentWeapon=0;updateWeaponUI();}
  if (e.key==='2'){currentWeapon=1;updateWeaponUI();}
  if (e.key==='3'){currentWeapon=2;updateWeaponUI();}
  if (e.key==='4'){currentWeapon=3;updateWeaponUI();}
  if (e.key.toLowerCase()==='r' && princessSaved) restartGame();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function updateWeaponUI() {
  const el = document.getElementById('weapon-ui');
  el.textContent = weaponNames[currentWeapon];
  el.style.color = weaponColors[currentWeapon].glow;
}

// ============ PARTICLES ============
const bloodParticles = [];
class BloodParticle {
  constructor(x,y,vx,vy) { this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=1;this.decay=0.008+Math.random()*0.015;this.size=2+Math.random()*5;this.hue=Math.random()*360; }
  update() { this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;this.vx*=0.99;this.life-=this.decay;this.hue+=2; }
  draw(cx) { if(this.life<=0)return;ctx.globalAlpha=this.life*0.9;ctx.fillStyle=`hsl(${this.hue%360},100%,55%)`;ctx.beginPath();ctx.arc(this.x-cx,this.y,Math.max(0.1,this.size*this.life),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1; }
}
const bloodSplats = [];
class BloodSplat {
  constructor(x,y) { this.x=x;this.y=y;this.size=8+Math.random()*20;this.alpha=0.6+Math.random()*0.3;this.hue=Math.random()*360; }
  draw(cx) { ctx.globalAlpha=this.alpha;ctx.fillStyle=`hsl(${this.hue},100%,45%)`;ctx.beginPath();ctx.ellipse(this.x-cx,this.y,this.size,this.size*0.3,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1; }
}
function spawnBlood(x,y,intensity=1) {
  const count=(12+Math.random()*15)*intensity;
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2;const s=2+Math.random()*8*intensity;if(bloodParticles.length<400)bloodParticles.push(new BloodParticle(x,y,Math.cos(a)*s,Math.sin(a)*s-3));}
  for(let i=0;i<3*intensity;i++){bloodSplats.push(new BloodSplat(x+(Math.random()-0.5)*60,y+30+Math.random()*20));if(bloodSplats.length>150)bloodSplats.shift();}
}

// ============ BUTTERFLY ============
const butterfly = {
  x:200, y:0, vx:0, vy:0,
  wingPhase:0, facing:1,
  swinging:false, swingTime:0, swingDuration:20,
  saberLength:70, hitCooldown:0
};

// ============ ENEMIES ============
const enemies = [];
function spawnEnemy(x, type='guard') {
  const groundY = H * GROUND_Y_RATIO;
  enemies.push({
    x, y: groundY - 30 + Math.random()*10,
    vx:0, vy:0,
    hp: type==='boss' ? 60 : 30,
    maxHp: type==='boss' ? 60 : 30,
    type, hitFlash:0, stunTimer:0, bobPhase:Math.random()*Math.PI*2,
    facing:-1, alive:true,
    scale: type==='boss' ? 1.4 : 0.9+Math.random()*0.3,
    shirtHue: Math.random()*360
  });
}

// Generate enemies along the world
function generateWorld() {
  enemies.length = 0;
  // Village guards
  for (let x = 600; x < 2500; x += 200 + Math.random()*200) spawnEnemy(x, 'guard');
  // Forest bandits
  for (let x = 3000; x < 5500; x += 150 + Math.random()*180) spawnEnemy(x, 'guard');
  // Mountain warriors
  for (let x = 6000; x < 8500; x += 130 + Math.random()*150) spawnEnemy(x, 'guard');
  // Castle approach - tougher
  for (let x = 9000; x < 11000; x += 120 + Math.random()*120) spawnEnemy(x, 'boss');
  // Final castle guards
  for (let x = 11000; x < CASTLE_X - 100; x += 100 + Math.random()*80) spawnEnemy(x, 'boss');
}

// ============ SCENERY (generated once) ============
const sceneryTrees = [];
const sceneryHouses = [];
const sceneryMountains = [];
const sceneryClouds = [];

function generateScenery() {
  sceneryTrees.length = 0; sceneryHouses.length = 0; sceneryMountains.length = 0; sceneryClouds.length = 0;
  // Mountains (background parallax)
  for (let x = 0; x < WORLD_LENGTH; x += 200+Math.random()*300) {
    sceneryMountains.push({ x, height: 100+Math.random()*200, width: 200+Math.random()*200, hue: 220+Math.random()*30 });
  }
  // Clouds
  for (let x = 0; x < WORLD_LENGTH; x += 150+Math.random()*250) {
    sceneryClouds.push({ x, y: 30+Math.random()*120, width: 60+Math.random()*100, height: 20+Math.random()*30 });
  }
  // Village houses (zone 1)
  for (let x = 400; x < 2200; x += 250+Math.random()*200) {
    sceneryHouses.push({ x, width:50+Math.random()*40, height:40+Math.random()*30, hue:20+Math.random()*30, hasChimney:Math.random()>0.5 });
  }
  // Trees throughout
  for (let x = 100; x < WORLD_LENGTH-800; x += 80+Math.random()*120) {
    const zone = x < 2500 ? 'village' : x < 5500 ? 'forest' : x < 8500 ? 'mountain' : 'castle';
    const density = zone==='forest' ? 0.8 : 0.4;
    if (Math.random() < density) {
      sceneryTrees.push({ x, height:40+Math.random()*60, width:20+Math.random()*20, type: zone==='mountain'?'pine':'oak', hue: zone==='forest'?100+Math.random()*40:80+Math.random()*60 });
    }
  }
}

// ============ ABILITIES ============
let forcePulseRings = [];
function doForcePush() {
  forcePushCooldown = FORCE_PUSH_CD; playSound('force');
  forcePulseRings.push({ x:butterfly.x, y:butterfly.y, radius:10, life:1 });
  enemies.forEach(e => {
    if (!e.alive) return;
    const dx=e.x-butterfly.x, dy=e.y-butterfly.y, dist=Math.max(50,Math.sqrt(dx*dx+dy*dy));
    if (dist < 250) {
      e.vx += (dx/dist)*25; e.vy += (dy/dist)*5; e.stunTimer=40; e.hitFlash=10;
      e.hp = Math.max(0, e.hp - (5+Math.random()*5));
      spawnBlood(e.x, e.y-10, 1.5); screenShake=12;
      if (e.hp<=0) killEnemy(e);
    }
  });
  hits++; updateStatsUI();
}

let lightningBolts = [];
function doLightning() {
  lightningCooldown = LIGHTNING_CD; playSound('lightning');
  // Target nearest enemy
  let nearest = null, nearDist = 400;
  enemies.forEach(e => {
    if (!e.alive) return;
    const d = Math.sqrt((e.x-butterfly.x)**2 + (e.y-butterfly.y)**2);
    if (d < nearDist) { nearDist=d; nearest=e; }
  });
  if (nearest) {
    lightningBolts.push({ life:30, target:nearest, points:genLightning(butterfly.x,butterfly.y,nearest.x,nearest.y-10) });
    nearest.hp = Math.max(0, nearest.hp-(12+Math.random()*8));
    nearest.hitFlash=20; nearest.stunTimer=50;
    spawnBlood(nearest.x,nearest.y-10,2); screenShake=10; hits++; combo++;
    if (nearest.hp<=0) killEnemy(nearest);
    updateStatsUI();
  }
}
function genLightning(x1,y1,x2,y2) {
  const pts=[{x:x1,y:y1}]; const segs=10;
  for(let i=1;i<segs;i++){const t=i/segs;pts.push({x:x1+(x2-x1)*t+(Math.random()-0.5)*60,y:y1+(y2-y1)*t+(Math.random()-0.5)*60});}
  pts.push({x:x2,y:y2}); return pts;
}

const shurikens = [];
function doShuriken() {
  shurikenCooldown = SHURIKEN_CD; playSound('shuriken');
  // Aim at nearest enemy or forward
  let tx = butterfly.x + butterfly.facing*300, ty = butterfly.y;
  let nearDist = 500;
  enemies.forEach(e => {
    if (!e.alive) return;
    const d = Math.sqrt((e.x-butterfly.x)**2+(e.y-butterfly.y)**2);
    if (d < nearDist) { nearDist=d; tx=e.x; ty=e.y-10; }
  });
  const dx=tx-butterfly.x, dy=ty-butterfly.y, dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));
  shurikens.push({ x:butterfly.x, y:butterfly.y, vx:(dx/dist)*14, vy:(dy/dist)*14, rotation:0, life:90 });
}

function killEnemy(e) {
  e.alive = false; kills++;
  for(let i=0;i<3;i++) spawnBlood(e.x, e.y-10, 2);
  screenShake = 10;
  playSound('hit');
  updateStatsUI();
}

// ============ SLASH TRAILS ============
const slashTrails = [];

// ============ DRAWING FUNCTIONS ============
function drawSky(t) {
  // Gradient sky that shifts by zone
  const zoneProgress = cameraX / WORLD_LENGTH;
  const r = Math.floor(10 + zoneProgress * 20);
  const g = Math.floor(10 + (1-zoneProgress) * 20);
  const b = Math.floor(30 + zoneProgress * 30);
  const grad = ctx.createLinearGradient(0,0,0,H*0.78);
  grad.addColorStop(0, `rgb(${r},${g},${b+30})`);
  grad.addColorStop(0.5, `rgb(${r+10},${g+10},${b+10})`);
  grad.addColorStop(1, `rgb(${r+20},${g+15},${b})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Stars (visible in darker areas)
  ctx.globalAlpha = Math.max(0, 0.5 - zoneProgress*0.3);
  for (let i = 0; i < 80; i++) {
    const sx = ((i*137.5+cameraX*0.02)%W+W)%W;
    const sy = ((i*97.3)%((H*0.6)))|0;
    const sz = 0.5 + (i%3)*0.5;
    const tw = Math.sin(t*0.002+i)*0.5+0.5;
    ctx.globalAlpha = tw * 0.4;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx,sy,sz,sz);
  }
  ctx.globalAlpha = 1;
}

function drawMountains(t) {
  const groundY = H * GROUND_Y_RATIO;
  sceneryMountains.forEach(m => {
    const sx = m.x * 0.3 - cameraX * 0.3; // parallax
    if (sx < -m.width || sx > W + m.width) return;
    ctx.fillStyle = `hsl(${m.hue}, 20%, 18%)`;
    ctx.beginPath();
    ctx.moveTo(sx - m.width/2, groundY);
    ctx.lineTo(sx, groundY - m.height);
    ctx.lineTo(sx + m.width/2, groundY);
    ctx.closePath();
    ctx.fill();
    // Snow cap
    if (m.height > 150) {
      ctx.fillStyle = 'rgba(200,220,255,0.4)';
      ctx.beginPath();
      ctx.moveTo(sx - m.width*0.1, groundY - m.height + 30);
      ctx.lineTo(sx, groundY - m.height);
      ctx.lineTo(sx + m.width*0.1, groundY - m.height + 30);
      ctx.closePath();
      ctx.fill();
    }
  });
}

function drawClouds(t) {
  sceneryClouds.forEach(c => {
    const sx = c.x * 0.5 - cameraX * 0.15 + Math.sin(t*0.0003+c.x)*20;
    if (sx < -c.width*2 || sx > W+c.width) return;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#aabbcc';
    ctx.beginPath();
    ctx.ellipse(sx, c.y, c.width, c.height, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx-c.width*0.4, c.y+5, c.width*0.6, c.height*0.7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx+c.width*0.3, c.y+3, c.width*0.5, c.height*0.8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawGround() {
  const gy = H * GROUND_Y_RATIO;
  // Determine zone color
  const worldX = cameraX + W/2;
  let grassHue, grassLight;
  if (worldX < 2500) { grassHue=120; grassLight=18; } // village green
  else if (worldX < 5500) { grassHue=130; grassLight=14; } // dark forest
  else if (worldX < 8500) { grassHue=40; grassLight=16; } // mountain brown
  else { grassHue=260; grassLight=12; } // castle dark

  const grad = ctx.createLinearGradient(0, gy, 0, H);
  grad.addColorStop(0, `hsl(${grassHue},30%,${grassLight+5}%)`);
  grad.addColorStop(1, `hsl(${grassHue},20%,${grassLight-3}%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, gy, W, H-gy);

  // Ground line
  ctx.strokeStyle = `hsl(${grassHue},30%,${grassLight+15}%)`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();

  // Path/road
  ctx.fillStyle = `hsl(${grassHue-10},15%,${grassLight+2}%)`;
  ctx.fillRect(0, gy + 20, W, 15);
}

function drawTrees() {
  const groundY = H * GROUND_Y_RATIO;
  sceneryTrees.forEach(tr => {
    const sx = tr.x - cameraX;
    if (sx < -50 || sx > W+50) return;
    // Trunk
    ctx.fillStyle = '#3d2b1f';
    ctx.fillRect(sx-3, groundY-tr.height, 6, tr.height);
    // Canopy
    if (tr.type === 'pine') {
      for (let i = 0; i < 3; i++) {
        const ty = groundY - tr.height + i*15;
        const tw = tr.width * (0.4 + i*0.25);
        ctx.fillStyle = `hsl(${tr.hue},40%,${20+i*5}%)`;
        ctx.beginPath();
        ctx.moveTo(sx, ty-10);
        ctx.lineTo(sx-tw/2, ty+12);
        ctx.lineTo(sx+tw/2, ty+12);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      ctx.fillStyle = `hsl(${tr.hue},40%,25%)`;
      ctx.beginPath();
      ctx.arc(sx, groundY-tr.height-5, tr.width*0.7, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = `hsl(${tr.hue},45%,30%)`;
      ctx.beginPath();
      ctx.arc(sx+5, groundY-tr.height+3, tr.width*0.5, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

function drawHouses() {
  const groundY = H * GROUND_Y_RATIO;
  sceneryHouses.forEach(h => {
    const sx = h.x - cameraX;
    if (sx < -80 || sx > W+80) return;
    // Wall
    ctx.fillStyle = `hsl(${h.hue},30%,55%)`;
    ctx.fillRect(sx-h.width/2, groundY-h.height, h.width, h.height);
    // Roof
    ctx.fillStyle = `hsl(${h.hue+10},40%,30%)`;
    ctx.beginPath();
    ctx.moveTo(sx-h.width/2-8, groundY-h.height);
    ctx.lineTo(sx, groundY-h.height-25);
    ctx.lineTo(sx+h.width/2+8, groundY-h.height);
    ctx.closePath();
    ctx.fill();
    // Door
    ctx.fillStyle = '#442200';
    ctx.fillRect(sx-5, groundY-18, 10, 18);
    // Window
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(sx+h.width/4-4, groundY-h.height+10, 8, 8);
    ctx.fillRect(sx-h.width/4-4, groundY-h.height+10, 8, 8);
    // Chimney
    if (h.hasChimney) {
      ctx.fillStyle = '#553322';
      ctx.fillRect(sx+h.width/4, groundY-h.height-30, 8, 20);
    }
  });
}

function drawCastle() {
  const groundY = H * GROUND_Y_RATIO;
  const sx = CASTLE_X - cameraX;
  if (sx < -400 || sx > W+400) return;

  // Castle body
  ctx.fillStyle = '#444466';
  ctx.fillRect(sx-120, groundY-200, 240, 200);

  // Towers
  [-130, 110].forEach(offset => {
    ctx.fillStyle = '#555577';
    ctx.fillRect(sx+offset-20, groundY-250, 40, 250);
    // Tower top (crenellations)
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = '#555577';
      ctx.fillRect(sx+offset-20+i*10, groundY-260, 6, 10);
    }
    // Tower cone
    ctx.fillStyle = '#883344';
    ctx.beginPath();
    ctx.moveTo(sx+offset-25, groundY-250);
    ctx.lineTo(sx+offset, groundY-285);
    ctx.lineTo(sx+offset+25, groundY-250);
    ctx.closePath();
    ctx.fill();
    // Tower window
    ctx.fillStyle = '#ffee66';
    ctx.beginPath();
    ctx.arc(sx+offset, groundY-220, 8, Math.PI, 0);
    ctx.fillRect(sx+offset-8, groundY-220, 16, 12);
    ctx.fill();
  });

  // Main wall crenellations
  for (let i = 0; i < 20; i++) {
    ctx.fillStyle = '#444466';
    ctx.fillRect(sx-120+i*13, groundY-210, 8, 10);
  }

  // Gate
  ctx.fillStyle = '#221122';
  ctx.beginPath();
  ctx.arc(sx, groundY-50, 30, Math.PI, 0);
  ctx.fillRect(sx-30, groundY-50, 60, 50);
  ctx.fill();

  // Portcullis lines
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  for (let i = -25; i <= 25; i += 10) {
    ctx.beginPath(); ctx.moveTo(sx+i, groundY-75); ctx.lineTo(sx+i, groundY); ctx.stroke();
  }

  // Banner
  ctx.fillStyle = '#cc2244';
  ctx.fillRect(sx-10, groundY-180, 20, 30);
  ctx.fillStyle = '#ffcc00';
  ctx.font = '14px serif';
  ctx.textAlign = 'center';
  ctx.fillText('♛', sx, groundY-160);

  // Princess in the tower!
  if (!princessSaved) {
    const px = sx + 110;
    const py = groundY - 230;
    // Hair
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(px, py-6, 9, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(px-8, py-4, 16, 15);
    // Face
    ctx.fillStyle = '#ffccaa';
    ctx.beginPath();
    ctx.arc(px, py-4, 7, 0, Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#44a';
    ctx.beginPath();
    ctx.arc(px-3, py-5, 1.5, 0, Math.PI*2);
    ctx.arc(px+3, py-5, 1.5, 0, Math.PI*2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(px-6, py-10);
    ctx.lineTo(px-4, py-16);
    ctx.lineTo(px, py-12);
    ctx.lineTo(px+4, py-16);
    ctx.lineTo(px+6, py-10);
    ctx.closePath();
    ctx.fill();
    // Dress
    ctx.fillStyle = '#ff66aa';
    ctx.beginPath();
    ctx.moveTo(px-6, py+3);
    ctx.lineTo(px-10, py+20);
    ctx.lineTo(px+10, py+20);
    ctx.lineTo(px+6, py+3);
    ctx.closePath();
    ctx.fill();
    // "Help!" text
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Help me!', px, py-22);
  }
}

// Zone labels
function drawZoneLabel(t) {
  const worldX = cameraX + W/2;
  let zone = '', color = '#888';
  if (worldX < 600) { zone = 'THE MEADOW'; color = '#8c8'; }

// ============ DRAW BUTTERFLY ============
function drawButterfly(t) {
  const b = butterfly;
  const sx = b.x - cameraX;
  ctx.save();
  ctx.translate(sx, b.y);

  const wingAngle = Math.sin(b.wingPhase) * 0.6;
  for (let side=-1;side<=1;side+=2) {
    ctx.save(); ctx.scale(side*b.facing, 1);
    ctx.save(); ctx.rotate(wingAngle*side);
    const wg=ctx.createRadialGradient(15,-10,0,15,-10,28);
    wg.addColorStop(0,'#ff88ff');wg.addColorStop(0.5,'#cc00cc');wg.addColorStop(1,'#660066');
    ctx.fillStyle=wg;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(10,-30,35,-30,30,-5);ctx.bezierCurveTo(28,5,5,5,0,0);ctx.fill();
    ctx.strokeStyle='#ff44ff';ctx.lineWidth=1;ctx.stroke();
    ctx.shadowColor='#ff00ff';ctx.shadowBlur=10;ctx.fillStyle='rgba(255,0,255,0.2)';ctx.fill();ctx.shadowBlur=0;
    ctx.restore();
    ctx.save();ctx.rotate(-wingAngle*side*0.7);
    const lg=ctx.createRadialGradient(12,8,0,12,8,22);
    lg.addColorStop(0,'#88ffff');lg.addColorStop(0.5,'#0088cc');lg.addColorStop(1,'#004466');
    ctx.fillStyle=lg;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(8,5,28,15,22,22);ctx.bezierCurveTo(15,28,3,15,0,0);ctx.fill();
    ctx.strokeStyle='#44ffff';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();ctx.restore();
  }
  ctx.fillStyle='#220033';ctx.beginPath();ctx.ellipse(0,0,4,12,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aa44ff';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-3,-10,3,0,Math.PI*2);ctx.arc(3,-10,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0f';ctx.beginPath();ctx.arc(-3+b.facing,-10,1.5,0,Math.PI*2);ctx.arc(3+b.facing,-10,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aa44ff';ctx.lineWidth=1.5;ctx.beginPath();
  ctx.moveTo(-2,-12);ctx.quadraticCurveTo(-10,-28,-8,-30);ctx.moveTo(2,-12);ctx.quadraticCurveTo(10,-28,8,-30);ctx.stroke();
  ctx.fillStyle='#ff88ff';ctx.beginPath();ctx.arc(-8,-30,2,0,Math.PI*2);ctx.arc(8,-30,2,0,Math.PI*2);ctx.fill();

  // Weapon
  drawWeapon(t);
  ctx.restore();
}

function drawWeapon(t) {
  const b = butterfly;
  const wc = weaponColors[currentWeapon];
  let angle;
  if (b.swinging) { const p=b.swingTime/b.swingDuration; angle=-Math.PI*0.8+p*Math.PI*1.4; }
  else { angle=-Math.PI/4+Math.sin(t*0.003)*0.1; }

  const drawBlade = (ox, glowCol) => {
    ctx.save(); if(ox)ctx.translate(ox,0);
    ctx.rotate(angle+(ox?ox*0.02:0));
    ctx.fillStyle='#888';ctx.fillRect(-2,8,4,16);ctx.fillStyle='#555';ctx.fillRect(-3,8,6,3);ctx.fillRect(-3,21,6,3);
    ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(0,15,1.5,0,Math.PI*2);ctx.fill();
    const bl=b.saberLength;
    if(currentWeapon===2&&b.swinging){for(let i=0;i<3;i++){const fy=8-Math.random()*bl;ctx.globalAlpha=0.4+Math.random()*0.3;ctx.fillStyle=`hsl(${Math.random()*40},100%,${50+Math.random()*30}%)`;ctx.beginPath();ctx.arc((Math.random()-0.5)*8,fy,2+Math.random()*4,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
    if(currentWeapon===3){for(let i=0;i<4;i++){const iy=8-(bl*i/4);ctx.globalAlpha=0.3;ctx.fillStyle='#aaeeff';ctx.save();ctx.translate(0,iy);ctx.rotate(t*0.01+i);ctx.fillRect(-3,-3,6,6);ctx.restore();}ctx.globalAlpha=1;}
    ctx.shadowColor=glowCol;ctx.shadowBlur=25;ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(0,8-bl);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=0.8;ctx.strokeStyle=glowCol;ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(0,8-bl);ctx.stroke();
    ctx.globalAlpha=0.3;ctx.lineWidth=16;ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(0,8-bl);ctx.stroke();ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,8-bl,3,0,Math.PI*2);ctx.fill();
    if(Math.random()>0.7){ctx.globalAlpha=0.15;ctx.strokeStyle=glowCol;ctx.lineWidth=20+Math.random()*10;ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(0,8-bl);ctx.stroke();ctx.globalAlpha=1;}
    ctx.restore();
  };

  if(currentWeapon===1){drawBlade(-6,wc.glow);drawBlade(6,'#00bbff');}
  else drawBlade(0,wc.glow);
}

// ============ DRAW ENEMY ============
function drawEnemy(e, t) {
  if (!e.alive) return;
  const sx = e.x - cameraX;
  if (sx < -60 || sx > W+60) return;

  ctx.save();
  ctx.translate(sx, e.y);
  ctx.scale(e.scale, e.scale);

  const bob = Math.sin(e.bobPhase)*3;
  if (e.hitFlash>0) ctx.globalAlpha = 0.5+0.5*Math.abs(Math.sin(e.hitFlash*0.5));

  const bodyColor = e.hitFlash>0 ? '#ff4444' : '#cc9966';
  const shirtColor = e.hitFlash>0 ? '#ff2222' : `hsl(${e.shirtHue},40%,40%)`;

  // Legs
  ctx.strokeStyle='#335';ctx.lineWidth=8;
  const lp=e.stunTimer>0?0:Math.sin(t*0.005)*0.2;
  ctx.beginPath();ctx.moveTo(-8,25+bob);ctx.lineTo(-12,55+Math.sin(lp)*5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,25+bob);ctx.lineTo(12,55-Math.sin(lp)*5);ctx.stroke();
  ctx.fillStyle='#222';ctx.fillRect(-17,53+Math.sin(lp)*5,12,6);ctx.fillRect(7,53-Math.sin(lp)*5,12,6);
  // Body
  ctx.fillStyle=shirtColor;ctx.beginPath();ctx.roundRect(-15,-5+bob,30,32,5);ctx.fill();
  // Arms
  ctx.strokeStyle=bodyColor;ctx.lineWidth=7;
  const aw=e.stunTimer>0?Math.sin(t*0.02)*0.5:Math.sin(t*0.004)*0.15;
  ctx.beginPath();ctx.moveTo(-15,2+bob);ctx.lineTo(-30,20+bob+Math.sin(aw)*10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(15,2+bob);ctx.lineTo(30,20+bob-Math.sin(aw)*10);ctx.stroke();
  // Head
  ctx.fillStyle=bodyColor;ctx.beginPath();ctx.arc(0,-15+bob,16,0,Math.PI*2);ctx.fill();
  // Helmet for boss
  if (e.type==='boss') {
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(0,-18+bob,17,Math.PI,0);ctx.fill();
    ctx.fillStyle='#777';ctx.fillRect(-2,-35+bob,4,12);
  } else {
    ctx.fillStyle='#442200';ctx.beginPath();ctx.arc(0,-22+bob,14,Math.PI,Math.PI*2);ctx.fill();
  }
  // Face
  if(e.stunTimer>0){
    ctx.strokeStyle='#333';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-8,-18+bob);ctx.lineTo(-3,-13+bob);ctx.moveTo(-3,-18+bob);ctx.lineTo(-8,-13+bob);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-18+bob);ctx.lineTo(8,-13+bob);ctx.moveTo(8,-18+bob);ctx.lineTo(3,-13+bob);ctx.stroke();
    ctx.beginPath();ctx.arc(0,-6+bob,5,0,Math.PI*2);ctx.stroke();
  } else {
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-5,-16+bob,2.5,0,Math.PI*2);ctx.arc(5,-16+bob,2.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-5+bob,5,0.2,Math.PI-0.2);ctx.stroke();
  }
  // HP bar
  const hpPct=e.hp/e.maxHp;
  ctx.fillStyle='#333';ctx.fillRect(-20,-45+bob,40,5);
  ctx.fillStyle=hpPct>0.5?'#0f0':hpPct>0.25?'#ff0':'#f00';
  ctx.fillRect(-20,-45+bob,40*hpPct,5);

  ctx.globalAlpha=1;
  ctx.restore();
}

// ============ VFX ============
function drawForcePulseRings() {
  for(let i=forcePulseRings.length-1;i>=0;i--){
    const r=forcePulseRings[i]; r.radius+=8; r.life-=0.03;
    const sx=r.x-cameraX;
    if(r.life<=0){forcePulseRings.splice(i,1);continue;}ctx.globalAlpha=r.life*0.5;ctx.strokeStyle=`hsl(${200+r.radius*0.5},80%,60%)`;ctx.lineWidth=Math.max(0.1,4*r.life);
    ctx.beginPath();ctx.arc(sx,r.y,r.radius,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(255,255,255,${r.life*0.3})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(sx,r.y,r.radius*0.7,0,Math.PI*2);ctx.stroke();
    if(r.life<=0||r.radius>250) forcePulseRings.splice(i,1);
  }
  ctx.globalAlpha=1;
}

function drawLightningBolts() {
  for(let i=lightningBolts.length-1;i>=0;i--){
    const bolt=lightningBolts[i]; bolt.life--;
    if(bolt.life%3===0 && bolt.target) bolt.points=genLightning(butterfly.x,butterfly.y,bolt.target.x,bolt.target.y-10);
    const alpha=bolt.life/30;
    ctx.globalAlpha=alpha*0.4;ctx.strokeStyle='#4488ff';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(bolt.points[0].x-cameraX,bolt.points[0].y);
    for(let j=1;j<bolt.points.length;j++) ctx.lineTo(bolt.points[j].x-cameraX,bolt.points[j].y);
    ctx.stroke();
    ctx.globalAlpha=alpha;ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bolt.points[0].x-cameraX,bolt.points[0].y);
    for(let j=1;j<bolt.points.length;j++) ctx.lineTo(bolt.points[j].x-cameraX,bolt.points[j].y);
    ctx.stroke();
    if(bolt.life<=0) lightningBolts.splice(i,1);
  }
  ctx.globalAlpha=1;
}

function drawShurikens() {
  for(let i=shurikens.length-1;i>=0;i--){
    const s=shurikens[i]; s.x+=s.vx; s.y+=s.vy; s.rotation+=0.4; s.life--;
    // Hit check
    let hit=false;
    enemies.forEach(e=>{
      if(!e.alive||hit)return;
      if(Math.sqrt((s.x-e.x)**2+(s.y-e.y)**2)<35){
        e.hp=Math.max(0,e.hp-(6+Math.random()*4));e.hitFlash=10;e.stunTimer=15;
        hits++;combo++;spawnBlood(e.x,e.y-10,1);screenShake=5;playSound('hit');
        if(e.hp<=0) killEnemy(e);
        updateStatsUI(); hit=true;
      }
    });
    if(hit||s.life<=0){shurikens.splice(i,1);continue;}
    const sx=s.x-cameraX;
    ctx.save();ctx.translate(sx,s.y);ctx.rotate(s.rotation);
    ctx.fillStyle='#ccc';
    for(let p=0;p<4;p++){ctx.save();ctx.rotate(p*Math.PI/2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-4,-12);ctx.lineTo(0,-10);ctx.lineTo(4,-12);ctx.closePath();ctx.fill();ctx.restore();}
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawSlashTrails() {
  for(let i=slashTrails.length-1;i>=0;i--){
    const tr=slashTrails[i];
    ctx.globalAlpha=tr.life*0.6;ctx.fillStyle=`hsl(${120+tr.life*20},100%,${50+tr.life*30}%)`;
    if(tr.life<=0){slashTrails.splice(i,1);continue;}ctx.beginPath();ctx.arc(tr.x-cameraX,tr.y,Math.max(0.1,3*tr.life),0,Math.PI*2);ctx.fill();
    tr.life-=0.05; if(tr.life<=0)slashTrails.splice(i,1);
  }
  ctx.globalAlpha=1;
}

// ============ HIT DETECTION (saber) ============
function getSaberTip() {
  const b=butterfly; if(!b.swinging)return null;
  const p=b.swingTime/b.swingDuration;
  const angle=-Math.PI*0.8+p*Math.PI*1.4;
  const len=b.saberLength+8;
  return { x:b.x+Math.cos(angle-Math.PI/2)*len, y:b.y+Math.sin(angle-Math.PI/2)*len };
}

function checkHit() {
  if(!butterfly.swinging||butterfly.hitCooldown>0) return;
  const tip=getSaberTip(); if(!tip)return;

  enemies.forEach(e=>{
    if(!e.alive)return;
    const dx=tip.x-e.x, dy=tip.y-e.y;
    if(Math.sqrt(dx*dx+dy*dy)<45*e.scale){
      let damage=8+Math.random()*7;
      if(currentWeapon===1)damage*=1.3;
      if(currentWeapon===2)damage*=1.5;
      if(currentWeapon===3){damage*=0.8;e.stunTimer=Math.max(e.stunTimer,50);}
      e.hp=Math.max(0,e.hp-damage);e.hitFlash=15;e.stunTimer=Math.max(e.stunTimer,30);
      butterfly.hitCooldown=5; hits++; combo++;
      const intensity=combo>=5?2:combo>=3?1.5:1;
      spawnBlood(e.x+(Math.random()-0.5)*20,e.y-10+(Math.random()-0.5)*20,intensity);
      screenShake=8*intensity; playSound('hit');
      if(e.hp<=0) killEnemy(e);
      updateStatsUI();
    }
  });
}

function updateStatsUI() {
  document.getElementById('hits').textContent = hits;
  document.getElementById('combo').textContent = combo;
  document.getElementById('kills').textContent = kills;
}

let screenShake = 0;

// ============ UPDATE ============
function updateButterfly() {
  const b=butterfly;
  const accel=0.6, friction=0.88;
  if(!princessSaved){
    if(keys['w']||keys['arrowup'])b.vy-=accel;
    if(keys['s']||keys['arrowdown'])b.vy+=accel;
    if(keys['a']||keys['arrowleft']){b.vx-=accel;b.facing=-1;}
    if(keys['d']||keys['arrowright']){b.vx+=accel;b.facing=1;}
  }
  b.vx*=friction; b.vy*=friction;
  b.x+=b.vx; b.y+=b.vy;
  b.x=Math.max(cameraX+30, Math.min(WORLD_LENGTH, b.x));
  b.y=Math.max(30, Math.min(H*0.75, b.y));
  b.wingPhase+=0.15;

  if(!b.swinging&&keys[' ']&&!princessSaved){b.swinging=true;b.swingTime=0;playSound(currentWeapon===2?'fire':currentWeapon===3?'ice':'swing');}
  if(b.swinging){b.swingTime++;const tip=getSaberTip();if(tip)slashTrails.push({x:tip.x,y:tip.y,life:1});if(b.swingTime>=b.swingDuration)b.swinging=false;}
  if(b.hitCooldown>0)b.hitCooldown--;
  if(forcePushCooldown>0)forcePushCooldown--;
  if(lightningCooldown>0)lightningCooldown--;
  if(shurikenCooldown>0)shurikenCooldown--;
  humTimer++; if(humTimer>50){humTimer=0;playSound('hum');}

  // Camera follows butterfly
  const targetCam = b.x - W*0.35;
  cameraX += (targetCam - cameraX) * 0.08;
  cameraX = Math.max(0, Math.min(WORLD_LENGTH - W, cameraX));

  // Progress bar
  const progress = Math.min(100, (b.x / CASTLE_X) * 100);
  document.getElementById('progress-bar').style.width = progress + '%';

  // Check castle entry
  if (!princessSaved && !castlePhase && b.x > CASTLE_X + 80) {
    castlePhase = true;
    castleRoom = 0;
    castleTransition = 60;
    castleTransitionDir = 1;
    castleButterfly = { x: 100, y: H * 0.5, vx: 0, vy: 0 };
    castleMessage = 'Entering the castle... 🏰';
    castleMessageTimer = 120;
    initCastleRoom(0);
    playSound('doorOpen');
    document.getElementById('progress-label').textContent = 'CASTLE EXPLORATION';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('instructions').innerHTML =
      'WASD / Arrows = fly around &bull; Explore each room! &bull; Find the princess!';
    document.getElementById('message').style.display = 'none';
  }
}

function updateEnemies(t) {
  enemies.forEach(e => {
    if(!e.alive)return;
    e.bobPhase+=0.05;
    if(e.hitFlash>0)e.hitFlash--;
    if(e.stunTimer>0){e.stunTimer--;e.vx*=0.9;e.x+=e.vx;return;}

    const dx=e.x-butterfly.x, dy=e.y-butterfly.y, dist=Math.sqrt(dx*dx+dy*dy);
    if (dist < 200) {
      // Attack mode - charge at butterfly
      e.vx += (-dx/dist) * 0.15;
      e.facing = dx > 0 ? -1 : 1;
    } else if (dist < 400) {
      // Alert - approach slowly
      e.vx += (-dx/dist) * 0.05;
    } else {
      // Patrol
      if(Math.random()<0.01) e.vx += (Math.random()-0.5)*1;
    }
    e.vx*=0.93; e.x+=e.vx;
    // Keep near spawn area
    const groundY = H*GROUND_Y_RATIO;
    e.y = groundY - 30 + Math.sin(e.bobPhase)*3;
  });
}

// ============ CASTLE INTERIOR ============
const ROOM_NAMES = ['🌈 Rainbow Hall', '🦄 Unicorn Stable', '🦎 Axolotl Pond', '🦋 Butterfly Garden', '👑 Throne Room'];
const ROOM_ICONS = ['🌈', '🦄', '🦎', '🦋', '👑'];

function initCastleRoom(room) {
  castleButterfly.x = 100;
  castleButterfly.y = H * 0.5;
  castleButterfly.vx = 0;
  castleButterfly.vy = 0;
  castleParticles = [];
  roomCompleteBurst = 0;

  if (room === 0) {
    // Rainbow Hall - 5 hidden stars
    rainbowStars = [];
    rainbowStarsCollected = 0;
    for (let i = 0; i < 5; i++) {
      rainbowStars.push({
        x: 120 + Math.random() * (W - 300),
        y: 100 + Math.random() * (H - 250),
        found: false,
        sparklePhase: Math.random() * Math.PI * 2,
        size: 20 + Math.random() * 10
      });
    }
  } else if (room === 1) {
    // Unicorn Stable - 6 unicorns, 1 faces right
    unicorns = [];
    unicornFound = false;
    const oddIndex = Math.floor(Math.random() * 6);
    for (let i = 0; i < 6; i++) {
      unicorns.push({
        x: 100 + (i % 3) * (W - 300) / 3 + 80,
        y: 180 + Math.floor(i / 3) * 200,
        facingRight: i === oddIndex,
        hue: [330, 270, 200, 50, 130, 0][i],
        selected: false
      });
    }
  } else if (room === 2) {
    // Axolotl Pond
    axolotls = [];
    axolotlsCaught = 0;
    axolotlSpawnTimer = 0;
  } else if (room === 3) {
    // Butterfly Garden - memory game
    memoryCards = [];
    memoryFlipped = [];
    memoryMatched = 0;
    memoryLockTimer = 0;
    const colors = ['#ff4488', '#44bbff', '#ffcc00', '#44ff88', '#ff4488', '#44bbff', '#ffcc00', '#44ff88'];
    const shuffled = colors.sort(() => Math.random() - 0.5);
    for (let i = 0; i < 8; i++) {
      memoryCards.push({
        x: 80 + (i % 4) * (W - 200) / 4 + 50,
        y: 180 + Math.floor(i / 4) * 180,
        color: shuffled[i],
        faceUp: false,
        matched: false
      });
    }
  } else if (room === 4) {
    // Throne Room
    princessReached = false;
  }
}

function spawnCastleParticles(x, y, count, hueBase) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 6;
    castleParticles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2,
      life: 1, decay: 0.01 + Math.random() * 0.02,
      size: 3 + Math.random() * 6,
      hue: hueBase + Math.random() * 60
    });
  }
}

function updateCastleButterfly() {
  const b = castleButterfly;
  const accel = 0.6, friction = 0.88;
  if (keys['w'] || keys['arrowup']) b.vy -= accel;
  if (keys['s'] || keys['arrowdown']) b.vy += accel;
  if (keys['a'] || keys['arrowleft']) { b.vx -= accel; butterfly.facing = -1; }
  if (keys['d'] || keys['arrowright']) { b.vx += accel; butterfly.facing = 1; }
  b.vx *= friction; b.vy *= friction;
  b.x += b.vx; b.y += b.vy;
  b.x = Math.max(40, Math.min(W - 40, b.x));
  b.y = Math.max(80, Math.min(H - 60, b.y));
  butterfly.wingPhase += 0.15;

  // Castle particles update
  for (let i = castleParticles.length - 1; i >= 0; i--) {
    const p = castleParticles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
    if (p.life <= 0) castleParticles.splice(i, 1);
  }

  if (castleMessageTimer > 0) castleMessageTimer--;
  if (roomCompleteBurst > 0) roomCompleteBurst--;
}

function completeRoom(room) {
  if (castleRoomCompleted[room]) return;
  castleRoomCompleted[room] = true;
  castleRevealedClues.push(castleClues[room]);
  roomCompleteBurst = 90;
  spawnCastleParticles(W / 2, H / 2, 60, Math.random() * 360);
  playSound('roomComplete');
  castleMessage = room < 4 ? `✨ ${ROOM_NAMES[room]} COMPLETE! ✨` : '';
  castleMessageTimer = 120;

  // Update progress bar
  const completed = castleRoomCompleted.filter(c => c).length;
  document.getElementById('progress-bar').style.width = (completed / 5 * 100) + '%';

  if (room === 4) {
    // Final room - princess saved!
    princessSaved = true;
    playSound('victory');
  }
}

function goToNextRoom() {
  if (castleRoom < 4) {
    castleRoom++;
    castleTransition = 30;
    castleTransitionDir = 1;
    initCastleRoom(castleRoom);
    playSound('doorOpen');
  }
}

function updateCastleRoom(t) {
  const b = castleButterfly;

  // Room-specific logic
  if (castleRoom === 0) {
    // Rainbow Hall - fly into stars
    rainbowStars.forEach(star => {
      if (star.found) return;
      star.sparklePhase += 0.05;
      const dx = b.x - star.x, dy = b.y - star.y;
      if (Math.sqrt(dx * dx + dy * dy) < star.size + 20) {
        star.found = true;
        rainbowStarsCollected++;
        spawnCastleParticles(star.x, star.y, 20, 45);
        playSound('sparkle');
        if (rainbowStarsCollected >= 5) completeRoom(0);
      }
    });
  } else if (castleRoom === 1) {
    // Unicorn Stable - fly into the different unicorn
    if (!unicornFound) {
      unicorns.forEach(u => {
        const dx = b.x - u.x, dy = b.y - u.y;
        if (Math.sqrt(dx * dx + dy * dy) < 50) {
          if (u.facingRight) {
            unicornFound = true;
            u.selected = true;
            spawnCastleParticles(u.x, u.y, 30, 300);
            playSound('sparkle');
            completeRoom(1);
          } else {
            // Wrong unicorn - little shake feedback
            u.selected = true;
            setTimeout(() => { u.selected = false; }, 300);
          }
        }
      });
    }
  } else if (castleRoom === 2) {
    // Axolotl Pond - catch appearing axolotls
    if (axolotlsCaught < AXOLOTL_GOAL) {
      axolotlSpawnTimer++;
      if (axolotlSpawnTimer > 40 && axolotls.length < 6) {
        axolotlSpawnTimer = 0;
        axolotls.push({
          x: 100 + Math.random() * (W - 250),
          y: 120 + Math.random() * (H - 250),
          life: 300,
          caught: false,
          bobPhase: Math.random() * Math.PI * 2,
          hue: 310 + Math.random() * 40
        });
      }
      for (let i = axolotls.length - 1; i >= 0; i--) {
        const a = axolotls[i];
        if (a.caught) continue;
        a.life--;
        a.bobPhase += 0.05;
        const dx = b.x - a.x, dy = b.y - a.y;
        if (Math.sqrt(dx * dx + dy * dy) < 45) {
          a.caught = true;
          axolotlsCaught++;
          spawnCastleParticles(a.x, a.y, 15, 300);
          playSound('sparkle');
          if (axolotlsCaught >= AXOLOTL_GOAL) completeRoom(2);
        }
        if (a.life <= 0 && !a.caught) axolotls.splice(i, 1);
      }
    }
  } else if (castleRoom === 3) {
    // Memory game
    if (memoryLockTimer > 0) {
      memoryLockTimer--;
      if (memoryLockTimer === 0 && memoryFlipped.length === 2) {
        const [a, b2] = memoryFlipped;
        if (memoryCards[a].color === memoryCards[b2].color) {
          memoryCards[a].matched = true;
          memoryCards[b2].matched = true;
          memoryMatched++;
          spawnCastleParticles((memoryCards[a].x + memoryCards[b2].x) / 2, (memoryCards[a].y + memoryCards[b2].y) / 2, 20, 120);
          playSound('sparkle');
          if (memoryMatched >= 4) completeRoom(3);
        } else {
          memoryCards[a].faceUp = false;
          memoryCards[b2].faceUp = false;
        }
        memoryFlipped = [];
      }
    } else {
      // Check fly-into cards
      memoryCards.forEach((card, i) => {
        if (card.matched || card.faceUp) return;
        const dx = b.x - card.x, dy = b.y - card.y;
        if (Math.sqrt(dx * dx + dy * dy) < 50) {
          card.faceUp = true;
          memoryFlipped.push(i);
          playSound('sparkle');
          if (memoryFlipped.length === 2) {
            memoryLockTimer = 40;
          }
        }
      });
    }
  } else if (castleRoom === 4) {
    // Throne Room - fly to princess
    if (!princessReached) {
      const px = W / 2, py = H * 0.4;
      const dx = b.x - px, dy = b.y - py;
      if (Math.sqrt(dx * dx + dy * dy) < 60) {
        princessReached = true;
        completeRoom(4);
      }
    }
  }

  // Door navigation - right side door appears when room is complete
  if (castleRoomCompleted[castleRoom] && castleRoom < 4) {
    if (b.x > W - 60 && b.y > H * 0.35 && b.y < H * 0.65) {
      goToNextRoom();
    }
  }
}

// ============ CASTLE DRAWING ============
function drawCastleRoomBG(t) {
  if (castleRoom === 0) {
    // Rainbow gradient animated
    const shift = t * 0.001;
    for (let y = 0; y < H; y += 4) {
      const hue = (y / H * 360 + shift * 60) % 360;
      ctx.fillStyle = `hsl(${hue}, 70%, 75%)`;
      ctx.fillRect(0, y, W, 4);
    }
    // Sparkly overlay
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 173.7 + t * 0.02) % W + W) % W;
      const sy = ((i * 211.3 + t * 0.015) % H + H) % H;
      const tw = Math.sin(t * 0.005 + i) * 0.5 + 0.5;
      ctx.globalAlpha = tw * 0.4;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (castleRoom === 1) {
    // Soft pink/purple with hay
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#ffccee'); grad.addColorStop(0.5, '#eeb8dd'); grad.addColorStop(1, '#ddaa99');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    // Hay bales
    for (let i = 0; i < 8; i++) {
      const hx = (i * W / 8 + 30) % W;
      ctx.fillStyle = '#ddbb55';

    }

  } else if (castleRoom === 2) {

    grad.addColorStop(0, '#6644cc'); grad.addColorStop(0.5, '#4488dd'); grad.addColorStop(1, '#3366aa');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    // Bubbles
    for (let i = 0; i < 25; i++) {
      const bx = ((i * 127.3 + t * 0.03 * (i % 3 + 1)) % W + W) % W;

      const bs = 4 + (i % 5) * 3;
      ctx.globalAlpha = 0.2 + Math.sin(t * 0.003 + i) * 0.1;
      ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(bx, by, bs, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Water plants at bottom
    for (let i = 0; i < 12; i++) {
      const px = i * (W / 12) + 20;
      const sway = Math.sin(t * 0.002 + i) * 10;
      ctx.strokeStyle = `hsl(${140 + i * 10}, 60%, 40%)`; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(px, H);
      ctx.quadraticCurveTo(px + sway, H - 50, px + sway * 1.5, H - 80 - Math.random() * 20);
      ctx.stroke();
    }
  } else if (castleRoom === 3) {
    // Garden
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#88ddff'); grad.addColorStop(0.6, '#aaffaa'); grad.addColorStop(1, '#66cc44');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    // Flowers
    for (let i = 0; i < 20; i++) {
      const fx = (i * 137.5) % W;
      const fy = H - 30 - (i % 5) * 8;

      ctx.fillStyle = `hsl(${fhue}, 80%, 60%)`;
      ctx.beginPath(); ctx.arc(fx + 1, fy, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(fx + 1, fy, 3, 0, Math.PI * 2); ctx.fill();
    }
  } else if (castleRoom === 4) {
    // Royal gold and purple
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#660088'); grad.addColorStop(0.3, '#8800aa'); grad.addColorStop(0.7, '#aa6600'); grad.addColorStop(1, '#ffcc44');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    // Gold pillars
    for (let i = 0; i < 6; i++) {
      const px = W * (i + 1) / 7;
      ctx.fillStyle = '#ddaa22';
      ctx.fillRect(px - 12, 60, 24, H - 100);
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(px - 16, 50, 32, 20);
      ctx.fillRect(px - 16, H - 50, 32, 20);
    }
    // Red carpet
    ctx.fillStyle = '#cc2244';
    ctx.fillRect(W / 2 - 60, H * 0.5, 120, H * 0.5);
    ctx.fillRect(W / 2 - 80, H * 0.48, 160, 20);
    // Throne
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(W / 2 - 40, H * 0.3 - 10, 80, 80);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(W / 2 - 45, H * 0.3 - 20, 90, 15);
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(W / 2 - 45, H * 0.3 - 20);
    ctx.lineTo(W / 2 - 35, H * 0.3 - 50);
    ctx.lineTo(W / 2 - 25, H * 0.3 - 30);
    ctx.lineTo(W / 2, H * 0.3 - 55);
    ctx.lineTo(W / 2 + 25, H * 0.3 - 30);
    ctx.lineTo(W / 2 + 35, H * 0.3 - 50);
    ctx.lineTo(W / 2 + 45, H * 0.3 - 20);
    ctx.closePath(); ctx.fill();
  }

  // Draw walls/frame
  ctx.strokeStyle = '#fff8'; ctx.lineWidth = 4;
  ctx.strokeRect(10, 70, W - 20, H - 90);
}

function drawCastleDoor(t) {
  if (!castleRoomCompleted[castleRoom] || castleRoom >= 4) return;
  // Right door
  const dx = W - 40, dy = H * 0.35, dh = H * 0.3;
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(dx - 15, dy, 30, dh);
  // Arch
  ctx.beginPath(); ctx.arc(dx, dy, 15, Math.PI, 0); ctx.fillStyle = '#8B4513'; ctx.fill();
  // Glow
  const glow = Math.sin(t * 0.005) * 0.3 + 0.7;
  ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 20 * glow;
  ctx.fillStyle = `rgba(255,204,0,${glow * 0.5})`;
  ctx.fillRect(dx - 12, dy + 3, 24, dh - 6);
  ctx.shadowBlur = 0;
  // Arrow
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('→', dx, dy + dh / 2 + 8);
}

function drawRoomProgressBar(t) {
  const barY = 15, barH = 45;
  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W / 2 - 250, barY, 500, barH);
  ctx.strokeStyle = '#fff4'; ctx.lineWidth = 2;
  ctx.strokeRect(W / 2 - 250, barY, 500, barH);

  for (let i = 0; i < 5; i++) {
    const rx = W / 2 - 230 + i * 95;
    const completed = castleRoomCompleted[i];
    const current = castleRoom === i;

    // Room box
    ctx.fillStyle = completed ? 'rgba(0,255,100,0.3)' : current ? 'rgba(255,255,0,0.2)' : 'rgba(100,100,100,0.3)';
    ctx.fillRect(rx, barY + 5, 85, barH - 10);
    if (current) {
      ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2;
      ctx.strokeRect(rx, barY + 5, 85, barH - 10);
    }

    // Icon
    ctx.font = '18px serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(completed ? '✅' : ROOM_ICONS[i], rx + 25, barY + 32);

    // Short label
    ctx.font = '9px Courier New';
    ctx.fillStyle = completed ? '#0f0' : current ? '#ff0' : '#888';
    const shortNames = ['Rain', 'Unic', 'Axol', 'Gard', 'Thr'];
    ctx.fillText(shortNames[i], rx + 58, barY + 32);
  }
  ctx.textAlign = 'left';
}

function drawRoomContent(t) {
  if (castleRoom === 0) {
    // Draw stars
    rainbowStars.forEach(star => {
      if (star.found) {
        // Found star - bright and stationary
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#ffcc00';
        ctx.font = `${star.size + 10}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('⭐', star.x, star.y + 8);
      } else {
        // Hidden star - semi-transparent, sparkle
        const sp = Math.sin(star.sparklePhase + t * 0.003) * 0.3 + 0.35;
        ctx.globalAlpha = sp;
        ctx.fillStyle = '#ffee44';
        ctx.font = `${star.size}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('⭐', star.x, star.y + 8);
        // Sparkle hint
        if (Math.sin(t * 0.01 + star.sparklePhase) > 0.8) {
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(star.x + (Math.random() - 0.5) * star.size, star.y + (Math.random() - 0.5) * star.size, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    });
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    // Counter
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(`Stars found: ${rainbowStarsCollected}/5`, W / 2, H - 20);
    ctx.textAlign = 'left';
  } else if (castleRoom === 1) {
    // Draw unicorns
    unicorns.forEach(u => {
      ctx.save();
      ctx.translate(u.x, u.y);
      if (!u.facingRight) ctx.scale(-1, 1);

      // Body
      ctx.fillStyle = u.selected ? '#fff' : `hsl(${u.hue}, 40%, 90%)`;
      ctx.beginPath();
      ctx.ellipse(0, 0, 35, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `hsl(${u.hue}, 50%, 70%)`; ctx.lineWidth = 2; ctx.stroke();

      // Legs
      ctx.fillStyle = `hsl(${u.hue}, 30%, 85%)`;
      ctx.fillRect(-20, 18, 8, 20);
      ctx.fillRect(-8, 18, 8, 20);
      ctx.fillRect(8, 18, 8, 20);
      ctx.fillRect(20, 18, 8, 20);

      // Hooves
      ctx.fillStyle = '#555';
      [-20, -8, 8, 20].forEach(lx => ctx.fillRect(lx - 1, 36, 10, 4));

      // Head
      ctx.fillStyle = `hsl(${u.hue}, 40%, 90%)`;
      ctx.beginPath(); ctx.ellipse(38, -12, 16, 14, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `hsl(${u.hue}, 50%, 70%)`; ctx.lineWidth = 1.5; ctx.stroke();

      // Eye
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(44, -15, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(45, -16, 1, 0, Math.PI * 2); ctx.fill();

      // Horn
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(38, -26);
      ctx.lineTo(35, -45);
      ctx.lineTo(41, -26);
      ctx.closePath(); ctx.fill();
      // Spiral on horn
      ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(39, -28); ctx.lineTo(37, -33); ctx.moveTo(38, -33); ctx.lineTo(36, -38); ctx.stroke();

      // Rainbow mane
      const maneColors = ['#ff4444', '#ff8800', '#ffcc00', '#44ff44', '#4488ff', '#8844ff'];
      maneColors.forEach((c, i) => {
        ctx.strokeStyle = c; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(30 - i * 5, -22);
        ctx.quadraticCurveTo(25 - i * 7, -30 - i * 2, 20 - i * 5, -15 + i * 2);
        ctx.stroke();
      });

      // Tail (rainbow)
      maneColors.forEach((c, i) => {
        ctx.strokeStyle = c; ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-35, -5 + i * 3);
        ctx.quadraticCurveTo(-50 - i * 3, -10 + i * 5, -55 - i * 2, 5 + i * 4);
        ctx.stroke();
      });

      // Glow if selected
      if (u.selected) {
        ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 30;
        ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.ellipse(0, 0, 40, 28, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    });
    // Hint
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('Find the unicorn facing a different direction!', W / 2, H - 20);
    ctx.textAlign = 'left';
  } else if (castleRoom === 2) {
    // Draw axolotls
    axolotls.forEach(a => {
      if (a.caught) return;
      const alpha = a.life < 30 ? a.life / 30 : 1;
      ctx.globalAlpha = alpha;
      const bob = Math.sin(a.bobPhase) * 5;
      ctx.save();
      ctx.translate(a.x, a.y + bob);

      // Body - cute pink blob
      ctx.fillStyle = `hsl(${a.hue}, 70%, 75%)`;
      ctx.beginPath(); ctx.ellipse(0, 0, 28, 18, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `hsl(${a.hue}, 60%, 60%)`; ctx.lineWidth = 2; ctx.stroke();

      // Gill frills (3 on each side)
      for (let side = -1; side <= 1; side += 2) {
        for (let f = 0; f < 3; f++) {
          const angle = (f - 1) * 0.4 + side * 1.2;
          ctx.strokeStyle = `hsl(${a.hue + 20}, 80%, 65%)`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(side * 18, -10);
          ctx.quadraticCurveTo(side * (28 + f * 5), -18 + f * 6, side * (32 + f * 3), -8 + f * 8);
          ctx.stroke();
          // Tips
          ctx.fillStyle = `hsl(${a.hue + 40}, 90%, 70%)`;
          ctx.beginPath();
          ctx.arc(side * (32 + f * 3), -8 + f * 8, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Eyes - big cute dots
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(-8, -4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(8, -4, 4, 0, Math.PI * 2); ctx.fill();
      // Eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-6, -6, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(10, -6, 2, 0, Math.PI * 2); ctx.fill();

      // Big smile
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 10, 0.2, Math.PI - 0.2); ctx.stroke();

      // Tail
      ctx.strokeStyle = `hsl(${a.hue}, 60%, 70%)`; ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(28, 0);
      ctx.quadraticCurveTo(42, -5 + Math.sin(a.bobPhase * 2) * 5, 50, 5);
      ctx.stroke();
      // Tail fin
      ctx.fillStyle = `hsl(${a.hue}, 70%, 75%)`;
      ctx.beginPath();
      ctx.moveTo(48, 0);
      ctx.quadraticCurveTo(58, -10, 55, 5);
      ctx.quadraticCurveTo(58, 20, 48, 10);
      ctx.closePath(); ctx.fill();

      // Little feet
      ctx.fillStyle = `hsl(${a.hue}, 60%, 70%)`;
      [-15, -5, 5, 15].forEach(fx => {
        ctx.beginPath(); ctx.ellipse(fx, 16, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
      });

      ctx.restore();
    });
    ctx.globalAlpha = 1;
    // Counter
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(`Axolotls found: ${axolotlsCaught}/${AXOLOTL_GOAL}`, W / 2, H - 20);
    ctx.textAlign = 'left';
  } else if (castleRoom === 3) {
    // Memory game cards
    memoryCards.forEach((card, i) => {
      ctx.save();
      ctx.translate(card.x, card.y);

      if (card.matched) {
        // Matched - show bright with glow
        ctx.shadowColor = card.color; ctx.shadowBlur = 15;
        ctx.fillStyle = card.color;
        ctx.beginPath(); ctx.roundRect(-35, -45, 70, 90, 10); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff'; ctx.font = '30px serif'; ctx.textAlign = 'center';
        ctx.fillText('🦋', 0, 10);
      } else if (card.faceUp) {
        // Face up
        ctx.fillStyle = card.color;
        ctx.beginPath(); ctx.roundRect(-35, -45, 70, 90, 10); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(-35, -45, 70, 90, 10); ctx.stroke();
      } else {
        // Face down
        ctx.fillStyle = '#8855aa';
        ctx.beginPath(); ctx.roundRect(-35, -45, 70, 90, 10); ctx.fill();
        ctx.strokeStyle = '#aa77cc'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(-35, -45, 70, 90, 10); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('?', 0, 12);
      }
      ctx.restore();
    });
    // Counter
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(`Pairs matched: ${memoryMatched}/4`, W / 2, H - 20);
    ctx.textAlign = 'left';
  } else if (castleRoom === 4) {
    // Princess in throne room
    if (!princessReached) {
      const px = W / 2, py = H * 0.4;
      // Glow
      ctx.globalAlpha = 0.3 + Math.sin(t * 0.005) * 0.15;
      const pg = ctx.createRadialGradient(px, py, 5, px, py, 80);
      pg.addColorStop(0, '#ffccff'); pg.addColorStop(1, '#ffccff00');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(px, py, 80, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      // Princess
      ctx.save(); ctx.translate(px, py);
      // Hair
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath(); ctx.arc(0, -14, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-12, -10, 24, 22);
      // Face
      ctx.fillStyle = '#ffccaa';
      ctx.beginPath(); ctx.arc(0, -10, 11, 0, Math.PI * 2); ctx.fill();
      // Eyes
      ctx.fillStyle = '#44a';
      ctx.beginPath(); ctx.arc(-4, -12, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -12, 2.5, 0, Math.PI * 2); ctx.fill();
      // Smile
      ctx.strokeStyle = '#c44'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -6, 4, 0.2, Math.PI - 0.2); ctx.stroke();
      // Crown
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(-9, -20); ctx.lineTo(-6, -30); ctx.lineTo(-1, -23);
      ctx.lineTo(4, -32); ctx.lineTo(9, -20); ctx.closePath(); ctx.fill();
      // Gems
      ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(-4, -23, 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#44f'; ctx.beginPath(); ctx.arc(4, -25, 2, 0, Math.PI * 2); ctx.fill();
      // Dress
      ctx.fillStyle = '#ff66aa';
      ctx.beginPath();
      ctx.moveTo(-10, 3); ctx.lineTo(-20, 35); ctx.lineTo(20, 35); ctx.lineTo(10, 3);
      ctx.closePath(); ctx.fill();
      // Sparkle details on dress
      ctx.fillStyle = '#ffaacc';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(-8 + i * 4, 15 + (i % 2) * 8, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('Fly to the princess!', W / 2, H - 20);
      ctx.textAlign = 'left';
    }
  }
}

function drawCastleButterfly(t) {
  const b = castleButterfly;
  // Store original position
  const origX = butterfly.x;
  const origY = butterfly.y;
  butterfly.x = b.x;
  butterfly.y = b.y;
  const origCamX = cameraX;
  cameraX = 0;

  // Extra bright ambient glow
  const wc = weaponColors[currentWeapon];
  ctx.globalAlpha = 0.25 + Math.sin(t * 0.005) * 0.08;
  const sg = ctx.createRadialGradient(b.x, b.y, 5, b.x, b.y, 90);
  sg.addColorStop(0, wc.glow + '88'); sg.addColorStop(1, wc.glow + '00');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(b.x, b.y, 90, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  drawButterfly(t);

  butterfly.x = origX;
  butterfly.y = origY;
  cameraX = origCamX;
}

function drawCastleParticles() {
  castleParticles.forEach(p => {
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = `hsl(${p.hue % 360}, 100%, 65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawCastleCelebration(t) {
  if (!princessSaved) return;

  // Massive confetti
  if (castleParticles.length < 200) {
    for (let i = 0; i < 5; i++) {
      spawnCastleParticles(Math.random() * W, -20, 3, Math.random() * 360);
    }
  }

  // Rainbows shooting across
  for (let r = 0; r < 3; r++) {
    const ry = H * 0.2 + r * H * 0.25;
    const rx = ((t * 2 + r * 500) % (W + 400)) - 200;
    const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'];
    colors.forEach((c, i) => {
      ctx.strokeStyle = c; ctx.lineWidth = 4; ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(rx - 100, ry + i * 5);
      ctx.quadraticCurveTo(rx, ry - 30 + i * 5, rx + 100, ry + i * 5);
      ctx.stroke();
    });
  }
  ctx.globalAlpha = 1;

  // Dancing emoji
  const emojis = ['🦋', '👸', '🦄', '🌈', '🦎'];
  emojis.forEach((e, i) => {
    const ex = W * (i + 1) / 6;
    const ey = H * 0.55 + Math.sin(t * 0.008 + i * 1.2) * 30;
    ctx.font = '40px serif'; ctx.textAlign = 'center';
    ctx.fillText(e, ex, ey);
  });

  // Big text
  ctx.font = 'bold 52px Courier New'; ctx.textAlign = 'center';
  ctx.fillStyle = '#ff66aa';
  ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 30;
  ctx.fillText('YOU SAVED THE PRINCESS!', W / 2, H * 0.3);
  ctx.shadowBlur = 0;

  // Clue message
  ctx.font = 'bold 36px Courier New';
  ctx.fillStyle = '#ffcc00';
  ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 20;
  ctx.fillText(castleRevealedClues.join(' '), W / 2, H * 0.7);
  ctx.shadowBlur = 0;

  // Restart hint
  ctx.font = '18px Courier New'; ctx.fillStyle = '#fff';
  ctx.fillText(`You defeated ${kills} enemies on your journey!`, W / 2, H * 0.8);
  ctx.fillText('Press R to play again', W / 2, H * 0.85);
  ctx.textAlign = 'left';
}

function drawCastleMessage(t) {
  if (castleMessageTimer <= 0) return;
  ctx.globalAlpha = Math.min(1, castleMessageTimer / 30);
  ctx.font = 'bold 28px Courier New'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#ff88ff'; ctx.shadowBlur = 20;
  ctx.fillText(castleMessage, W / 2, H * 0.15);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawRoomCompleteBurst(t) {
  if (roomCompleteBurst <= 0) return;
  const alpha = roomCompleteBurst / 90;
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${60 + (90 - roomCompleteBurst) * 0.5}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.shadowColor = '#ff88ff'; ctx.shadowBlur = 30;
  ctx.fillText('COMPLETE!', W / 2, H * 0.45);
  ctx.shadowBlur = 0;
  // Show clue word
  if (castleRevealedClues.length > 0) {
    ctx.font = 'bold 24px Courier New';
    ctx.fillStyle = '#88ffff';
    ctx.fillText('Clue: "' + castleRevealedClues[castleRevealedClues.length - 1] + '"', W / 2, H * 0.55);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function castleGameLoop(t) {
  // Transition effect
  if (castleTransition > 0) {
    castleTransition--;
    ctx.fillStyle = '#000';
    ctx.globalAlpha = castleTransition / 30;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    if (castleTransition > 15) return; // still fading
  }

  drawCastleRoomBG(t);
  drawRoomContent(t);
  drawCastleDoor(t);
  drawCastleParticles();
  drawCastleButterfly(t);
  drawRoomProgressBar(t);
  drawCastleMessage(t);
  drawRoomCompleteBurst(t);

  if (princessSaved) {
    drawCastleCelebration(t);
  } else {
    updateCastleButterfly();
    updateCastleRoom(t);
  }
}

// ============ MAIN LOOP ============
function gameLoop(t) {
  try {
  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);screenShake*=0.85;if(screenShake<0.5)screenShake=0;}

  if (castlePhase) {
    // Castle interior mode
    castleGameLoop(t);
  } else {
    drawSky(t);
    drawMountains(t);
    drawClouds(t);
    drawGround();
    drawTrees();
    drawHouses();
    drawCastle();
    drawZoneLabel(t);

    // Blood splats
    bloodSplats.forEach(s=>s.draw(cameraX));
    for(let i=bloodParticles.length-1;i>=0;i--){bloodParticles[i].update();bloodParticles[i].draw(cameraX);if(bloodParticles[i].life<=0)bloodParticles.splice(i,1);}

    drawSlashTrails();
    drawForcePulseRings();
    drawLightningBolts();
    drawShurikens();

    if(!princessSaved) {
      updateButterfly();
      updateEnemies(t);
      checkHit();
    } else {
      updateButterfly();
    }

    enemies.forEach(e=>drawEnemy(e,t));
    drawButterfly(t);

    // Ambient glow
    const wc=weaponColors[currentWeapon];
    ctx.globalAlpha=0.12+Math.sin(t*0.005)*0.04;
    const sg=ctx.createRadialGradient(butterfly.x-cameraX,butterfly.y,5,butterfly.x-cameraX,butterfly.y,60);
    sg.addColorStop(0,wc.glow+'55');sg.addColorStop(1,wc.glow+'00');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(butterfly.x-cameraX,butterfly.y,60,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    drawCooldownHUD();
    drawMinimap();
  }

  ctx.restore();
  } catch(err) { console.error('Game loop error:', err); }
  requestAnimationFrame(gameLoop);
}

// ============ INIT ============
butterfly.x = 200;
butterfly.y = H * 0.5;
generateScenery();
generateWorld();
requestAnimationFrame(gameLoop);
</script>
